<!DOCTYPE html>
<html>
<head>
<title>Equivoca Capital Game</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
margin-top:80px;
}

button{
padding:15px 30px;
font-size:18px;
margin:15px;
cursor:pointer;
}

#capital{
font-size:28px;
margin:20px;
}

.segment{
width:18px;
height:18px;
background:#2ecc71;
border-radius:50%;
position:absolute;
}

#game{
position:relative;
height:200px;
}

</style>

</head>

<body>

<h1>Equivoca Capital</h1>
<p>Clarity vs Ambiguity</p>

<div id="capital">Capital: $1,000,000</div>

<div id="game"></div>

<button onclick="clarify()">Clarify</button>
<button onclick="equivocate()">Equivocate</button>

<p id="msg"></p>

<script>

let capital = 1000000
let risk = 0
let game = document.getElementById("game")
let chain=[]

function update(){
document.getElementById("capital").innerText=
"Capital: $" + capital.toLocaleString()
}

function grow(){

let dot=document.createElement("div")
dot.className="segment"

dot.style.left=(chain.length*22+50)+"px"
dot.style.top="100px"

game.appendChild(dot)

chain.push(dot)

}

function clarify(){

capital+=150000
grow()

document.getElementById("msg").innerText=
"Clarity created steady gains."

update()

}

function equivocate(){

capital+=350000
risk+=0.2
grow()

if(Math.random()<risk){

capital*=0.4

document.getElementById("msg").innerText=
"Ambiguity triggered a collapse."

}else{

document.getElementById("msg").innerText=
"Risk paid off."

}

update()

}

for(let i=0;i<4;i++) grow()

</script>

</body>
</html>
