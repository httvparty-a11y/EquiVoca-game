<!DOCTYPE html>
<html>
<head>
<title>Equivoca Capital Strategy Game</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow:hidden;
}

h1{
margin-top:30px;
font-size:40px;
}

#capital{
font-size:26px;
margin:20px;
}

#game{
position:relative;
height:300px;
margin-top:40px;
}

.segment{
width:20px;
height:20px;
background:#1db954;
border-radius:50%;
position:absolute;
}

button{
padding:14px 28px;
font-size:18px;
margin:20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.clarify{
background:#2ecc71;
color:white;
}

.equivocate{
background:#e63946;
color:white;
}

#message{
margin-top:10px;
font-size:18px;
}

</style>
</head>

<body>

<h1>Equivoca Capital</h1>
<p>Clarity vs Ambiguity Strategy Game</p>

<div id="capital">Capital: $1,000,000</div>

<div id="game"></div>

<button class="clarify" onclick="clarify()">Clarify Decision</button>
<button class="equivocate" onclick="equivocate()">Equivocate</button>

<p id="message"></p>

<script>

let capital = 1000000
let risk = 0
let centipede = []
let gameArea = document.getElementById("game")

function updateCapital(){

document.getElementById("capital").innerText =
"Capital: $" + capital.toLocaleString()

}

function createSegment(x,y){

let seg = document.createElement("div")
seg.className="segment"
seg.style.left=x+"px"
seg.style.top=y+"px"

gameArea.appendChild(seg)

centipede.push(seg)

}

function grow(){

let last = centipede[centipede.length-1]

createSegment(
parseInt(last.style.left)+25,
parseInt(last.style.top)
)

}

function clarify(){

capital += 150000

grow()

document.getElementById("message").innerText =
"Clarity compounds steady gains."

updateCapital()

}

function equivocate(){

capital += 350000
risk += .15

grow()

if(Math.random() < risk){

capital = capital * .3

document.getElementById("message").innerText =
"Ambiguity triggered volatility."

}else{

document.getElementById("message").innerText =
"Risk paid off… this time."

}

updateCapital()

}

function init(){

for(let i=0;i<5;i++){

createSegment(100+i*25,150)

}

}

init()

</script>

</body>
</html>
