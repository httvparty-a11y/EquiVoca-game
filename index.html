<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equivoca Capital Strategy Game - Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <img src="assets/logo.png" alt="Equivoca Capital" id="logo">
  <h1>Markets Punish Ambiguity. Clarity Wins.</h1>
  <button id="startBtn">Start Game</button>
</div>

<div id="gameContainer" style="display:none;">
  <div id="capital">$1,000,000</div>
  <div id="gameArea"></div>
  <div class="buttons">
    <button class="clarify" onclick="clarify()">Clarify Decision</button>
    <button class="equivocate" onclick="equivocate()">Equivocate</button>
  </div>
  <p id="message"></p>
</div>

<script src="game.js"></script>
</body>
</html>
