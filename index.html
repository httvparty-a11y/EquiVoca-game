<!DOCTYPE html>
<html>
<head>
<title>Equivoca Capital Strategy Game</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
margin-top:80px;
}

button{
padding:15px 30px;
font-size:18px;
margin:20px;
cursor:pointer;
border:none;
border-radius:6px;
}

.clarify{background:#2ecc71;}
.equivocate{background:#e63946;}

#capital{
font-size:28px;
margin:20px;
}

#centipede{
margin-top:30px;
font-size:28px;
letter-spacing:4px;
}

</style>
</head>

<body>

<h1>Equivoca Capital</h1>
<p>Clarity vs Ambiguity</p>

<div id="capital">Capital: $1,000,000</div>

<div id="centipede">●●●●</div>

<button class="clarify" onclick="clarify()">Clarify Decision</button>
<button class="equivocate" onclick="equivocate()">Equivocate</button>

<p id="msg"></p>

<script>

let capital = 1000000
let risk = 0
let length = 4

function update(){

document.getElementById("capital").innerText =
"Capital: $" + capital.toLocaleString()

document.getElementById("centipede").innerText =
"●".repeat(length)

}

function clarify(){

capital += 150000
length++

document.getElementById("msg").innerText =
"Clarity created steady gains."

update()

}

function equivocate(){

capital += 350000
risk += 0.2
length++

if(Math.random() < risk){

capital = Math.floor(capital * 0.4)

document.getElementById("msg").innerText =
"Ambiguity triggered a collapse."

}else{

document.getElementById("msg").innerText =
"Risk paid off this round."

}

update()

}

</script>

</body>
</html>
