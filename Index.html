<!DOCTYPE html>
<html>
<head>
<title>Equivoca Capital – Clarity Game</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
margin-top:60px;
}

h1{
font-size:48px;
}

button{
padding:15px 30px;
margin:20px;
font-size:20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.clarify{
background:#1db954;
color:white;
}

.equivocate{
background:#d62828;
color:white;
}

.capital{
font-size:28px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Equivoca Capital</h1>
<h2>Clarity vs Ambiguity</h2>

<p class="capital" id="capital">Capital: $1,000,000</p>

<button class="clarify" onclick="clarify()">Clarify</button>
<button class="equivocate" onclick="equivocate()">Equivocate</button>

<p id="status"></p>

<script>

let capital = 1000000
let risk = 0
let step = 1

function update(){
document.getElementById("capital").innerHTML =
"Capital: $" + capital.toLocaleString()
}

function clarify(){

capital += 200000
step++

document.getElementById("status").innerHTML =
"Clarity secured smaller gains."

update()

}

function equivocate(){

capital += 500000
risk += 0.2
step++

if(Math.random() < risk){

document.getElementById("status").innerHTML =
"Ambiguity compounded. Capital collapsed."

capital = 0
}

else{

document.getElementById("status").innerHTML =
"Risk increased. Capital grew."

}

update()

}

</script>

</body>
</html>
