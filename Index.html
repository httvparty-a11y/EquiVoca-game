<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EquiVoca Spin Wheel</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle, #1a1a5a, #000);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        color: gold;
    }

    .balance {
        font-size: 28px;
        margin: 10px;
        background: gold;
        color: black;
        display: inline-block;
        padding: 10px 30px;
        border-radius: 10px;
    }

    .wheel-container {
        position: relative;
        margin: 40px auto;
        width: 320px;
        height: 320px;
    }

    canvas {
        border-radius: 50%;
        border: 8px solid gold;
    }

    .pointer {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 40px;
        color: red;
    }

    button {
        margin-top: 20px;
        padding: 15px 40px;
        font-size: 20px;
        background: hotpink;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: deeppink;
    }

    .result {
        margin-top: 20px;
        font-size: 24px;
        color: lime;
    }
</style>
</head>
<body>

<h1>🎰 EquiVoca Spin</h1>
<div class="balance">Balance: $0.00</div>

<div class="wheel-container">
    <div class="pointer">▼</div>
    <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button onclick="spinWheel()">SPIN</button>

<div class="result" id="result"></div>

<audio id="spinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-wheel-coin-win-216.wav"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.wav"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = [
    "MINI", "SPIN", "BAR", "BONUS",
    "BIG", "MINOR", "WILD", "SPIN"
];

const colors = [
    "#ff4d4d", "#ffcc00", "#33cc33", "#3399ff",
    "#cc33ff", "#ff9933", "#00cccc", "#ff66cc"
];

let angle = 0;
let spinning = false;

function drawWheel() {
    const arc = Math.PI * 2 / segments.length;

    for (let i = 0; i < segments.length; i++) {
        ctx.beginPath();
        ctx.fillStyle = colors[i];
        ctx.moveTo(160, 160);
        ctx.arc(160, 160, 160, arc * i + angle, arc * (i + 1) + angle);
        ctx.fill();

        ctx.save();
        ctx.translate(160, 160);
        ctx.rotate(arc * i + arc / 2 + angle);
        ctx.fillStyle = "black";
        ctx.font = "16px Arial";
        ctx.fillText(segments[i], 60, 5);
        ctx.restore();
    }
}

function spinWheel() {
    if (spinning) return;

    spinning = true;
    document.getElementById("spinSound").play();

    let spinAngle = Math.random() * 2000 + 2000;
    let duration = 3000;
    let start = null;

    function animate(timestamp) {
        if (!start) start = timestamp;
        let progress = timestamp - start;

        let easeOut = 1 - Math.pow(1 - progress / duration, 3);
        let currentAngle = spinAngle * easeOut;

        angle = currentAngle * Math.PI / 180;

        ctx.clearRect(0, 0, 320, 320);
        drawWheel();

        if (progress < duration) {
            requestAnimationFrame(animate);
        } else {
            spinning = false;
            finishSpin();
        }
    }

    requestAnimationFrame(animate);
}

function finishSpin() {
    const arc = 2 * Math.PI / segments.length;
    let index = Math.floor((2 * Math.PI - (angle % (2 * Math.PI))) / arc) % segments.length;

    let result = segments[index];
    document.getElementById("result").innerText = "Result: " + result;

    document.getElementById("winSound").play();
}

drawWheel();
</script>

</body>
</html>
